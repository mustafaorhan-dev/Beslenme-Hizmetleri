<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Depo Sıcaklık Takibi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --text2: #475569; --text3: #94a3b8;
      --border: #e2e8f0; --accent: #6366f1; --cyan: #22d3ee; --green: #10b981; --red: #ef4444; --orange: #f59e0b;
      --radius: 14px; --shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0f1e; --card: #131d35; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
        --border: rgba(255,255,255,0.08); --shadow: 0 4px 20px rgba(0,0,0,0.4);
      }
    }
    html { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100%;
      padding: 0; margin: 0;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 1rem; }

    /* Header */
    .header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem; position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(12px);
    }
    .header-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; gap: 0.75rem; }
    .header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
    .header .sub { font-size: 0.75rem; color: var(--text3); font-weight: 400; display: block; margin-top: 2px; }
    .btn-back {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      padding: 0.5rem 0.7rem; cursor: pointer; color: var(--text2);
      font-size: 1.1rem; display: flex; align-items: center; gap: 0.3rem;
      transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(99,102,241,0.08); border-color: var(--accent); }

    /* Depot Grid */
    .depo-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
      padding: 1rem 0;
    }
    .depo-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1rem;
      cursor: pointer; transition: all 0.2s;
      text-align: center; box-shadow: var(--shadow);
    }
    .depo-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.15); }
    .depo-card:active { transform: scale(0.97); }
    .depo-card .depo-icon { font-size: 1.8rem; margin-bottom: 0.4rem; }
    .depo-card .depo-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .depo-card .depo-status {
      display: inline-block; margin-top: 0.4rem; padding: 0.15rem 0.6rem;
      border-radius: 999px; font-size: 0.7rem; font-weight: 600;
    }
    .depo-status.ok { background: rgba(16,185,129,0.12); color: var(--green); }
    .depo-status.warn { background: rgba(245,158,11,0.12); color: var(--orange); }
    .depo-status.err { background: rgba(239,68,68,0.12); color: var(--red); }
    .depo-status.na { background: rgba(100,116,139,0.1); color: var(--text3); }

    /* Detail Screen */
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .section-title {
      font-size: 0.85rem; font-weight: 700; color: var(--text2);
      margin: 1.25rem 0 0.75rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Today Readings */
    .reading-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .reading-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.85rem 1rem;
      display: flex; align-items: center; gap: 0.75rem;
      box-shadow: var(--shadow);
    }
    .reading-time { font-size: 0.75rem; color: var(--text3); min-width: 50px; font-weight: 600; }
    .reading-temp {
      font-size: 1.2rem; font-weight: 800; min-width: 70px;
    }
    .reading-temp.ok { color: var(--green); }
    .reading-temp.warn { color: var(--orange); }
    .reading-temp.err { color: var(--red); }
    .reading-status { font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 999px; }
    .reading-note { font-size: 0.75rem; color: var(--text3); flex: 1; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reading-empty {
      text-align: center; padding: 2rem; color: var(--text3);
      font-size: 0.85rem; background: var(--card); border-radius: 12px;
      border: 1px dashed var(--border);
    }

    /* Recent Readings Table */
    .recent-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .recent-table th {
      text-align: left; padding: 0.5rem 0.6rem;
      color: var(--text3); font-weight: 600; font-size: 0.7rem;
      text-transform: uppercase; border-bottom: 1px solid var(--border);
    }
    .recent-table td {
      padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--border);
      color: var(--text2);
    }
    .recent-table tr:last-child td { border-bottom: none; }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.75rem 1.25rem;
      font-size: 0.85rem; font-weight: 500; color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 100; display: none;
      animation: toastIn 0.25s ease;
    }
    .toast.show { display: block; }
    .toast.success { border-color: rgba(16,185,129,0.3); }
    .toast.error { border-color: rgba(239,68,68,0.3); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    @media (max-width: 400px) {
      .depo-grid { grid-template-columns: 1fr; }
      .container { padding: 0.75rem; }
      .reading-temp { font-size: 1rem; min-width: 55px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <button class="btn-back" id="backBtn" onclick="goBack()" style="display:none">←</button>
      <h1 id="pageTitle">Depo Sıcaklık Takibi <span class="sub" id="pageSub">QR Kod ile Hızlı Giriş</span></h1>
    </div>
  </div>

  <div class="container">

    <!-- === SELECTION SCREEN === -->
    <div class="screen active" id="selectScreen">
      <p style="font-size:0.85rem;color:var(--text3);margin-bottom:0.5rem;padding-top:0.25rem">
        Sıcaklığını görüntülemek istediğiniz depoyu seçin:
      </p>
      <div class="depo-grid" id="depoGrid"></div>
    </div>

    <!-- === DETAIL SCREEN === -->
    <div class="screen" id="detailScreen">
      <div class="section-title">📋 Bugünkü Kayıtlar</div>
      <div class="reading-list" id="todayReadings"></div>

      <div class="section-title">📊 Son Kayıtlar</div>
      <div style="background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden">
        <table class="recent-table" id="recentTable">
          <thead><tr><th>Tarih</th><th>Saat</th><th>Sıcaklık</th><th>Durum</th></tr></thead>
          <tbody id="recentTbody"></tbody>
        </table>
      </div>
      <div style="height:2rem"></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─── STATE ───────────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'haccp_records';
    const DEPO_KEY = 'haccp_depo_adlari';
    const DEFAULT_DEPOLAR = ['So\u011fuk Hava Deposu 5', 'So\u011fuk Hava Deposu 6', 'So\u011fuk Hava Deposu 7', 'So\u011fuk Hava Deposu 8'];
    let haccpRecords = [];
    let selectedDepo = null;
    let allDepos = [];

    // ─── STORAGE ─────────────────────────────────────────────────────────────────
    function loadData() {
      try {
        var s = localStorage.getItem(STORAGE_KEY);
        haccpRecords = s ? JSON.parse(s) : [];
      } catch (e) { haccpRecords = []; }
      try {
        var d = localStorage.getItem(DEPO_KEY);
        allDepos = d ? JSON.parse(d) : [...DEFAULT_DEPOLAR];
      } catch (e) { allDepos = [...DEFAULT_DEPOLAR]; }
    }

    // ─── SICAKLIK DURUM ──────────────────────────────────────────────────────────
    function sicaklikDurum(v, depoAd) {
      var val = parseFloat(v);
      if (isNaN(val)) return { text: '\u2014', cls: 'na', emoji: '\u2753' };
      var min, max;
      if (depoAd && depoAd.toLowerCase().includes('dondurucu')) { min = -24; max = -18; }
      else { min = 0; max = 4; }
      if (val >= min && val <= max) return { text: 'Uygun', cls: 'ok', emoji: '\u2705' };
      if (val < min) return { text: 'D\u00fc\u015f\u00fck', cls: 'warn', emoji: '\u26A0\uFE0F' };
      return { text: 'Y\u00fcksek', cls: 'err', emoji: '\u274C' };
    }

    // ─── TODAY ───────────────────────────────────────────────────────────────────
    function todayStr() {
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    // ─── RENDER DEPO GRID ────────────────────────────────────────────────────────
    function renderDepoGrid() {
      var grid = document.getElementById('depoGrid');
      var today = todayStr();
      grid.innerHTML = allDepos.map(function(ad) {
        var todayRecs = haccpRecords.filter(function(r) {
          return r.type === 'sicaklik' && r.depoAd === ad && r.tarih === today;
        });
        var last = todayRecs.length > 0 ? todayRecs[todayRecs.length - 1] : null;
        var statusHtml = '';
        if (last) {
          var durum = sicaklikDurum(last.sicaklik, ad);
          statusHtml = '<span class="depo-status ' + durum.cls + '">' + durum.emoji + ' ' + last.sicaklik + '\u00B0C</span>';
        } else {
          statusHtml = '<span class="depo-status na">Kay\u0131t yok</span>';
        }
        return '<div class="depo-card" onclick="selectDepo(\'' + ad.replace(/'/g, "\\'") + '\')">' +
          '<div class="depo-icon">\uD83C\uDFCA</div>' +
          '<div class="depo-name">' + ad + '</div>' +
          statusHtml + '</div>';
      }).join('');
    }

    // ─── SELECT DEPO ─────────────────────────────────────────────────────────────
    function selectDepo(ad) {
      selectedDepo = ad;
      document.getElementById('selectScreen').classList.remove('active');
      document.getElementById('detailScreen').classList.add('active');
      document.getElementById('backBtn').style.display = 'flex';
      document.getElementById('pageTitle').textContent = ad;
      document.getElementById('pageSub').textContent = 'Bug\u00fcn: ' + new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
      renderDetail();
    }

    function goBack() {
      selectedDepo = null;
      document.getElementById('selectScreen').classList.add('active');
      document.getElementById('detailScreen').classList.remove('active');
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('pageTitle').textContent = 'Depo S\u0131cakl\u0131k Takibi';
      document.getElementById('pageSub').textContent = 'QR Kod ile H\u0131zl\u0131 Giri\u015f';
      loadData();
      renderDepoGrid();
    }

    function formatTarihTR(t) {
      if (!t) return '—';
      var m = t.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return m ? m[3] + '.' + m[2] + '.' + m[1] : t;
    }

    // ─── RENDER DETAIL ────────────────────────────────────────────────────────────
    function renderDetail() {
      console.log('haccpRecords:', haccpRecords.length, 'selectedDepo:', selectedDepo);
      var today = todayStr();
      var todayRecs = haccpRecords.filter(function(r) {
        return r.type === 'sicaklik' && r.depoAd === selectedDepo && r.tarih === today;
      }).sort(function(a, b) { return (a.saat || '') > (b.saat || '') ? 1 : -1; });

      var todayEl = document.getElementById('todayReadings');
      if (todayRecs.length === 0) {
        todayEl.innerHTML = '<div class="reading-empty">Bug\u00fcn hen\u00fcz kay\u0131t girilmedi</div>';
      } else {
        todayEl.innerHTML = todayRecs.map(function(r) {
          var durum = sicaklikDurum(r.sicaklik, selectedDepo);
          return '<div class="reading-item">' +
            '<span class="reading-time">' + (r.saat || '--:--') + '</span>' +
            '<span class="reading-temp ' + durum.cls + '">' + r.sicaklik + '\u00B0C</span>' +
            '<span class="reading-status badge-' + durum.cls + '" style="font-size:0.7rem;font-weight:600;padding:0.15rem 0.5rem;border-radius:999px;background:rgba(16,185,129,0.1);color:var(--' + (durum.cls === 'ok' ? 'green' : durum.cls === 'warn' ? 'orange' : 'red') + ')">' + durum.text + '</span>' +
            '<span class="reading-note">' + (r.not || '') + '</span>' +
          '</div>';
        }).join('');
      }

      // Recent (last 20, all dates)
      var allRecs = haccpRecords.filter(function(r) {
        return r.type === 'sicaklik' && r.depoAd === selectedDepo;
      }).sort(function(a, b) {
        if (a.tarih !== b.tarih) return a.tarih > b.tarih ? -1 : 1;
        return (a.saat || '') > (b.saat || '') ? -1 : 1;
      }).slice(0, 20);

      var tbody = document.getElementById('recentTbody');
      if (allRecs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:1.5rem">Hen\u00fcz kay\u0131t yok</td></tr>';
      } else {
        tbody.innerHTML = allRecs.map(function(r) {
          var durum = sicaklikDurum(r.sicaklik, selectedDepo);
          var dateStr = formatTarihTR(r.tarih);
          return '<tr>' +
            '<td>' + dateStr + '</td>' +
            '<td>' + (r.saat || '--:--') + '</td>' +
            '<td style="font-weight:700;color:var(--' + (durum.cls === 'ok' ? 'green' : durum.cls === 'warn' ? 'orange' : 'red') + ')">' + r.sicaklik + '\u00B0C</td>' +
            '<td><span style="font-size:0.7rem;font-weight:600;padding:0.1rem 0.4rem;border-radius:999px;background:rgba(16,185,129,0.1);color:var(--' + (durum.cls === 'ok' ? 'green' : durum.cls === 'warn' ? 'orange' : 'red') + ')">' + durum.text + '</span></td>' +
          '</tr>';
        }).join('');
      }
    }

    // ─── HANDLE URL PARAM ────────────────────────────────────────────────────────
    function getUrlParam(name) {
      var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
      return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : null;
    }

    // ─── TOAST ────────────────────────────────────────────────────────────────────
    function showToast(msg, type) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show ' + (type || '');
      clearTimeout(el._timer);
      el._timer = setTimeout(function() { el.classList.remove('show'); }, 2500);
    }

    // ─── NORMALIZE ───────────────────────────────────────────────────────────────
    function normalizeDate(v) {
      if (!v) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
      if (/^\d+(\.\d+)?$/.test(String(v))) {
        var d = new Date(1899, 11, 30 + Number(v));
        if (!isNaN(d)) return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      }
      var d = new Date(v);
      if (!isNaN(d)) return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      return '';
    }
    function normalizeSaat(v) {
      if (!v) return '';
      if (/^\d{2}:\d{2}$/.test(v)) return v;
      var d = new Date(v);
      if (!isNaN(d)) return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      return v;
    }

    // ─── INIT ────────────────────────────────────────────────────────────────────
    (function() {
      loadData();
      var directDepo = getUrlParam('depo');
      var dataStr = getUrlParam('v');
      var subEl = document.getElementById('pageSub');

      // QR'dan gelen veri varsa (depo.html?depo=X&v=tarih|saat|sicaklik,...)
      if (dataStr) {
        var items = dataStr.split(',').filter(Boolean);
        items.forEach(function(item) {
          var parts = item.split('|');
          if (parts.length >= 3) {
            haccpRecords.push({
              id: Date.now() + Math.random(),
              type: 'sicaklik',
              tarih: parts[0],
              saat: parts[1],
              depoAd: directDepo,
              sicaklik: parseFloat(parts[2]),
              not: ''
            });
          }
        });
        if (haccpRecords.length > 0 && directDepo && allDepos.indexOf(directDepo) < 0) {
          allDepos.push(directDepo);
        }
      }

      if (directDepo && allDepos.indexOf(directDepo) >= 0) {
        selectDepo(directDepo);
      } else if (directDepo) {
        allDepos.push(directDepo);
        selectDepo(directDepo);
      } else {
        renderDepoGrid();
      }
    })();
  </script>
</body>
</html>
